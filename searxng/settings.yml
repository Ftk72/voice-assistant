# Configuration minimale de SearXNG (méta-moteur auto-hébergé, ADR 0007).
# La vraie clé est fournie par SEARXNG_SECRET (fichier .env non versionné, cf. compose) ;
# la valeur ci-dessous n'est qu'un garde-fou jamais utilisé.

use_default_settings: true

server:
  secret_key: "changez-moi-au-premier-lancement"
  limiter: false

search:
  # Le format json est indispensable au World Forge (il interroge l'API, pas le HTML).
  formats:
    - html
    - json
