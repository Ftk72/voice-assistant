# coturn — TURN/STUN local souverain pour le transport voix (ADR 0012).
# Dev local uniquement : lié à 127.0.0.1 par le mapping compose, pas de TLS.
# La media ne quitte jamais la machine.

listening-port=3478

# Plage de ports de relais bornée — DOIT correspondre au mapping de ports compose.
min-port=49160
max-port=49179

# Authentification long-terme (identifiants de dev locaux, non exposés hors 127.0.0.1).
lt-cred-mech
user=voix:voixsecret
realm=voix.local

# Réseau host (cf. docker-compose.yml) : coturn découvre et advertise de vraies
# adresses hôte pour ses relais — pas d'external-ip à forcer.

# Local/dev : pas de chiffrement.
no-tls
no-dtls

# Premier run : verbeux pour diagnostiquer l'allocation des relais.
verbose
fingerprint
