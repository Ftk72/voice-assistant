<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prototype pont voix ā€” Transport Voix</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 3rem auto;
             padding: 0 1rem; line-height: 1.5; }
      button { font-size: 1.1rem; padding: 0.6rem 1.4rem; cursor: pointer; }
      #etat { margin-top: 1rem; font-weight: 600; }
      #journal { margin-top: 1rem; white-space: pre-wrap; font-family: monospace;
                 font-size: 0.85rem; color: #555; border-top: 1px solid #ddd;
                 padding-top: 0.6rem; }
    </style>
  </head>
  <body>
    <h1>Prototype du pont voix</h1>
    <p>
      Outil de dĆ©veloppement (ADR 0012, Ā« bouton d'abord Ā») pour valider le pont
      WebView2ā†”Pipecat : appuie, parle, Ć©coute la rĆ©ponse. Ce n'est
      <em>pas</em> le module dialogue (front A4).
    </p>
    <button id="bouton">Parler</button>
    <div id="etat">En veille.</div>
    <audio id="audio" autoplay></audio>
    <div id="journal"></div>

    <script>
      const bouton = document.getElementById("bouton");
      const etat = document.getElementById("etat");
      const audio = document.getElementById("audio");
      const journal = document.getElementById("journal");
      let pc = null;

      function tracer(msg) {
        journal.textContent += msg + "\n";
      }

      async function demarrer() {
        bouton.disabled = true;
        etat.textContent = "Connexionā€¦";
        // Force le relais par le coturn local : toute la media passe par lui,
        // ce qui contourne les blocages NAT/pare-feu WSL2ā†”Windows (souverain,
        // rien ne quitte la machine). Identifiants = config du transport.
        pc = new RTCPeerConnection({
          iceServers: [
            { urls: "turn:127.0.0.1:3478", username: "voix", credential: "voixsecret" },
          ],
          iceTransportPolicy: "relay",
        });

        pc.ontrack = (e) => {
          audio.srcObject = e.streams[0];
          tracer("Piste audio reĆ§ue.");
        };
        pc.onconnectionstatechange = () => {
          etat.textContent = "Ć‰tat : " + pc.connectionState;
          tracer("connectionState = " + pc.connectionState);
        };

        // Canal de donnĆ©es pour les Ć©vĆ©nements RTVI (transcriptions, phrases).
        pc.createDataChannel("pipecat");

        // Micro (getUserMedia ā€” AEC/NS/AGC du navigateur gratuits, ADR 0010).
        // addTrack crĆ©e un transceiver **sendrecv** : il envoie le micro ET
        // reĆ§oit l'audio de l'assistant sur la mĆŖme piste. NE PAS ajouter de
        // transceiver Ā« audio Ā» supplĆ©mentaire, sinon Pipecat lit la piste vide
        // (silence) et coupe la rĆ©ception aprĆØs ~3 s d'inactivitĆ©.
        const flux = await navigator.mediaDevices.getUserMedia({ audio: true });
        flux.getTracks().forEach((t) => pc.addTrack(t, flux));

        const offre = await pc.createOffer();
        await pc.setLocalDescription(offre);

        const reponse = await fetch("/offer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sdp: offre.sdp, type: offre.type }),
        });
        if (!reponse.ok) {
          etat.textContent = "Ć‰chec /offer : " + reponse.status;
          tracer(await reponse.text());
          bouton.disabled = false;
          return;
        }
        const answer = await reponse.json();
        await pc.setRemoteDescription(answer);
        tracer("RĆ©ponse SDP appliquĆ©e (pc_id=" + answer.pc_id + ").");
        etat.textContent = "En conversation.";
        bouton.textContent = "Raccrocher";
        bouton.disabled = false;
        bouton.onclick = raccrocher;
      }

      function raccrocher() {
        if (pc) {
          pc.close();
          pc = null;
        }
        etat.textContent = "En veille.";
        bouton.textContent = "Parler";
        bouton.onclick = demarrer;
      }

      bouton.onclick = demarrer;
    </script>
  </body>
</html>
