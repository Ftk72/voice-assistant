<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pastille</title>
    <link rel="stylesheet" href="pastille.css" />
  </head>
  <body>
    <!-- Pastille : présence permanente de l'assistant (CONTEXT.md). Fenêtre
         sans décor, transparente, toujours au-dessus. L'état (veille / écoute /
         parle) reflète les événements RTVI réels du transport, relayés par la
         console via l'événement Tauri `etat-pastille` (cf. pastille.js). -->
    <div id="pastille" class="etat-veille" title="Assistant vocal">
      <span class="pastille-lumiere" aria-hidden="true"></span>
      <span id="pastille-texte" class="pastille-texte">En veille</span>
    </div>
    <script src="pastille.js"></script>
  </body>
</html>
