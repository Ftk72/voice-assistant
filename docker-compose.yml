# Assistant vocal local — 10 services (dont 4 sur mesure : voice-forge, memory,
# world, time ; le Pont hôte tourne hors Docker — ADR 0008). Voir docs/adr/.
# Tous les ports hôte sont liés à 127.0.0.1 (debug uniquement — la coquille
# consomme les forges en HTTP, ADR 0009).
# Prérequis : modèles téléchargés via scripts/download-models.sh (voir README).

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  llm:
    # Qwen3.6-35B-A3B Q4_K_M, experts MoE déchargés en RAM (~6 Go VRAM, ADR 0004)
    # tag « server-cuda » figé par digest (image déjà tirée le 2026-07-06).
    image: ghcr.io/ggml-org/llama.cpp@sha256:c52d27d6c81fa224711ab8fd9cf415fd824bd1eeefb380bf920abaa54bebb752
    command: >-
      -m /models/qwen3.6-35b-a3b-q4_k_m.gguf
      --host 0.0.0.0 --port 8080
      -ngl 999 --n-cpu-moe 999
      -c 8192 --jinja
      --reasoning off
    <<: *gpu
    volumes:
      - ./models/llm:/models:ro
    ports:
      - "127.0.0.1:8001:8080"   # accès direct pour debug uniquement
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s        # chargement du modèle
    restart: unless-stopped

  stt:
    # Whisper large-v3-turbo via whisper.cpp (~1 Go VRAM) — écart à l'ADR 0001
    # (2026-07-07, voir docs/impasses.md pour l'historique du remplacement de
    # l'ancien moteur STT). Image compilée localement pour sm_120
    # (stt/Dockerfile) ; --inference-path rend l'API compatible OpenAI ;
    # --convert accepte les formats audio compressés en entrée.
    build: ./stt
    command: >-
      --model /models/ggml-large-v3-turbo-q5_0.bin
      --host 0.0.0.0 --port 8080
      --inference-path /v1/audio/transcriptions
      --convert
      -l fr
    <<: *gpu
    volumes:
      - ./models/stt:/models:ro
    ports:
      - "127.0.0.1:8002:8080"   # accès direct pour debug uniquement
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  voice-forge:
    # TTS + clonage de voix (Chatterbox, ~3 Go VRAM, ADR 0002) — seul code custom.
    # Essai Qwen3-TTS (latence) : build --build-arg TTS_EXTRA=qwen3tts puis
    # VOICE_FORGE_PROVIDER=qwen3tts — les deux moteurs ne cohabitent pas dans
    # une même image (extras uv conflictuels, voir voice-forge/pyproject.toml).
    build: ./voice-forge
    <<: *gpu
    environment:
      VOICE_FORGE_HOST: 0.0.0.0          # à l'intérieur du réseau Docker uniquement
      VOICE_FORGE_PROVIDER: chatterbox
      VOICE_FORGE_DECODEUR: ffmpeg       # dépôt multi-format (mp3, m4a…) → WAV ; ffmpeg dans l'image
      VOICE_FORGE_VOICES_DIR: /data/voices
      VOICE_FORGE_CACHE_DIR: /data/cache
      VOICE_FORGE_CHATTERBOX_DIR: /models/chatterbox
      VOICE_FORGE_QWEN3TTS_DIR: /models/qwen3-tts/base
      HF_HOME: /data/hf-cache            # poids Chatterbox (pré-téléchargeables)
    volumes:
      - ./voices:/data/voices
      - ./models/hf-cache:/data/hf-cache
      - ./models/chatterbox:/models/chatterbox:ro
      - ./models/qwen3-tts:/models/qwen3-tts:ro
      - voice-forge-cache:/data/cache
    ports:
      - "127.0.0.1:8100:8100"   # mini-page d'admin des voix : http://127.0.0.1:8100/admin
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  # ---- Mémoire persistante (phase 2, ADR 0005) ----

  neo4j:
    # tag « 5-community » figé par digest (image déjà tirée le 2026-07-06).
    image: neo4j@sha256:4bae36aff76271e27fd6a6ed0835413f86a284cd179cfb1cb7d188f5f7533aca
    environment:
      # Mot de passe dans .env (non versionné), comme SEARXNG_SECRET et HOST_BRIDGE_TOKEN.
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?définir NEO4J_PASSWORD dans .env}
    ports:
      - "127.0.0.1:7474:7474"   # Neo4j Browser (visualisation du graphe)
      - "127.0.0.1:7687:7687"   # bolt, pour debug local
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  embedder:
    # Qwen3-Embedding-0.6B sur CPU (ADR 0009, remplace bge-m3) — API embeddings
    # compatible OpenAI. « --pooling last » impératif : sans lui, llama-server
    # renvoie des embeddings de tokens, pas de phrases (piège documenté).
    # tag « server » (CPU) figé par digest (image déjà tirée le 2026-07-06).
    image: ghcr.io/ggml-org/llama.cpp@sha256:ac8b800287d2f6cd2d200b7f718c14ee79cc810db2115b63d2f04284e499a98e
    command: >-
      -m /models/Qwen3-Embedding-0.6B-Q8_0.gguf
      --embeddings --pooling last
      --host 0.0.0.0 --port 8080
    volumes:
      - ./models/embedder:/models:ro
    ports:
      - "127.0.0.1:8003:8080"   # debug uniquement
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  memory:
    build: ./memory-forge
    environment:
      MEMORY_FORGE_HOST: 0.0.0.0          # réseau Docker interne uniquement
      MEMORY_FORGE_BACKEND: graphiti
      MEMORY_FORGE_NEO4J_URI: bolt://neo4j:7687
      MEMORY_FORGE_NEO4J_PASSWORD: ${NEO4J_PASSWORD:?définir NEO4J_PASSWORD dans .env}
      MEMORY_FORGE_LLM_BASE_URL: http://llm:8080/v1
      MEMORY_FORGE_INSIGHT_BACKEND: openai
      MEMORY_FORGE_EMBEDDER_BASE_URL: http://embedder:8080/v1
      MEMORY_FORGE_DOCUMENTS_DIR: /documents
    volumes:
      # lecture-écriture : le watcher y persiste .memory-forge-state.json
      - ./documents:/documents
    ports:
      - "127.0.0.1:8200:8200"
    depends_on:
      neo4j:
        condition: service_healthy
      embedder:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  # ---- Monde extérieur (phase 6, ADR 0007) ----

  searxng:
    # Méta-moteur auto-hébergé — tag daté figé (= latest au 2026-07-05, déjà tiré).
    image: searxng/searxng:2026.7.5-a6438586a
    environment:
      # Prime sur server.secret_key de settings.yml — la clé vit dans .env (non versionné).
      SEARXNG_SECRET: ${SEARXNG_SECRET:?définir SEARXNG_SECRET dans .env}
    volumes:
      - ./searxng:/etc/searxng:rw
    ports:
      - "127.0.0.1:8080:8080"   # debug uniquement
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  world:
    build: ./world-forge
    environment:
      WORLD_FORGE_HOST: 0.0.0.0          # réseau Docker interne uniquement
      WORLD_FORGE_GATEWAY: real
      WORLD_FORGE_SEARXNG_URL: http://searxng:8080
      WORLD_FORGE_FEEDS: ""              # flux RSS du briefing, séparés par des virgules
    ports:
      - "127.0.0.1:8300:8300"
    depends_on:
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8300/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  # ---- Quotidien + agenda (phases 3+5, ADR 0008) ----

  time:
    build: ./time-forge
    environment:
      TIME_FORGE_HOST: 0.0.0.0           # réseau Docker interne uniquement
      TIME_FORGE_STORE: sqlite
      TIME_FORGE_SQLITE_PATH: /data/agenda.db
      TIME_FORGE_ANNOUNCER: hostbridge
      TIME_FORGE_VOICE_FORGE_URL: http://voice-forge:8100
      # Voix des annonces — doit exister dans le Voice Forge (sinon 400
      # « Voix inconnue » silencieux). Vraie voix clonée (ticket wayfinder 0015).
      TIME_FORGE_ANNOUNCE_VOICE: Jackie
      TIME_FORGE_HOST_BRIDGE_URL: http://host.docker.internal:8500
      # Jeton partagé du Pont hôte — même valeur que HOST_BRIDGE_TOKEN au
      # lancement du Pont (fichier .env non versionné).
      TIME_FORGE_HOST_BRIDGE_TOKEN: ${HOST_BRIDGE_TOKEN:?définir HOST_BRIDGE_TOKEN dans .env}
      TZ: Europe/Paris                   # échéances en heure locale
    volumes:
      - time-forge-data:/data
    extra_hosts:
      # joint le Pont hôte, qui tourne hors Docker — ADR 0008
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8400:8400"
    depends_on:
      voice-forge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8400/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  # ---- Orchestrateur de dialogue (le « cerveau », ADR 0009) ----

  dialogue:
    build: ./dialogue-forge
    environment:
      DIALOGUE_FORGE_HOST: 0.0.0.0             # réseau Docker interne uniquement
      DIALOGUE_FORGE_LLM_BACKEND: openai        # llama.cpp, API OpenAI-compat
      DIALOGUE_FORGE_LLM_BASE_URL: http://llm:8080/v1
      DIALOGUE_FORGE_MEMOIRE_BACKEND: rest
      DIALOGUE_FORGE_MEMORY_FORGE_URL: http://memory:8200
      DIALOGUE_FORGE_OUTILS_BACKEND: mcp
      # Client MCP de time / world / memory (noms de services Docker).
      DIALOGUE_FORGE_MCP_URLS: '["http://time:8400/mcp","http://world:8300/mcp","http://memory:8200/mcp"]'
      DIALOGUE_FORGE_PERSONAS_DIR: /personas
      DIALOGUE_FORGE_VOIX_BACKEND: rest
      DIALOGUE_FORGE_VOICE_FORGE_URL: http://voice-forge:8100
      DIALOGUE_FORGE_REGLAGE_PATH: /data/reglage.json
    volumes:
      - ./personas:/personas:ro
      - dialogue-forge-data:/data
    ports:
      - "127.0.0.1:8600:8600"
    depends_on:
      memory:
        condition: service_healthy
      world:
        condition: service_healthy
      time:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8600/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

volumes:
  voice-forge-cache:
  neo4j-data:
  time-forge-data:
  dialogue-forge-data:
