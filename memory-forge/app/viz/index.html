<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Memory Forge — visualisation du graphe</title>
<style>
  :root {
    --bg: #0e1013; --panel: #1a1d23; --line: #2e333b;
    --text: #e8e9eb; --muted: #9aa0a8;
    --souvenir: #6ea8fe; --document: #74c69d; --obsolete: #6c757d; --accent: #f0a63a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 system-ui, sans-serif; background: var(--bg); color: var(--text); }
  header { display: flex; flex-wrap: wrap; gap: .6rem 1.1rem; align-items: center;
           padding: .65rem 1rem; background: var(--panel); border-bottom: 1px solid var(--line); }
  h1 { font-size: .95rem; margin: 0; font-weight: 600; white-space: nowrap; }
  input, select, button { font: inherit; background: var(--bg); color: var(--text);
                          border: 1px solid var(--line); border-radius: 6px; padding: .3rem .6rem; }
  button { cursor: pointer; } button:hover { border-color: var(--muted); }
  button.danger:hover { border-color: #e5534b; color: #e5534b; }
  fieldset { border: 0; padding: 0; margin: 0; display: flex; gap: .7rem; align-items: center; }
  legend { display: none; }
  label { color: var(--muted); display: flex; gap: .3rem; align-items: center; cursor: pointer; white-space: nowrap; }
  main { display: flex; height: calc(100vh - 53px); }
  #scene { flex: 1; min-width: 0; position: relative; background: var(--bg); }
  aside { width: 340px; border-left: 1px solid var(--line); background: var(--panel);
          padding: 1rem; overflow-y: auto; flex-shrink: 0; }
  aside h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: .04em;
             color: var(--muted); margin: 1.2rem 0 .5rem; }
  aside h2:first-child { margin-top: 0; }
  .fait { border: 1px solid var(--line); border-radius: 8px; padding: .5rem .65rem; margin-bottom: .5rem; }
  .fait.obsolete { opacity: .5; }
  .fait .meta { color: var(--muted); font-size: .78rem; margin-top: .25rem; }
  .badge { display: inline-block; padding: 0 .45rem; border-radius: 999px; font-size: .72rem; }
  .badge.conversation { background: color-mix(in srgb, var(--souvenir) 25%, transparent); color: var(--souvenir); }
  .badge.document { background: color-mix(in srgb, var(--document) 25%, transparent); color: var(--document); }
  #status { color: var(--muted); flex-basis: 100%; font-size: .8rem; }
  #entite-selection { display: flex; flex-direction: column; gap: .4rem; }
  #entite-selection .nom { font-weight: 600; }
  #entite-selection button { align-self: flex-start; }
  .vide { color: var(--muted); font-style: italic; }
</style>
</head>
<body>
<header>
  <h1>Memory Forge — graphe 3D</h1>
  <form id="form-recherche">
    <input id="entite" placeholder="Recherche d'entité (ex. Léa)" size="20" autofocus>
    <select id="profondeur" title="Profondeur du voisinage">
      <option value="1">1 saut</option><option value="2" selected>2 sauts</option><option value="3">3 sauts</option>
    </select>
    <button type="submit">Explorer</button>
  </form>
  <button type="button" id="btn-graphe-complet" title="Recharger le graphe entier">Graphe complet</button>
  <fieldset title="Filtres par provenance">
    <label><input type="checkbox" id="f-conversation" checked> conversation</label>
    <label><input type="checkbox" id="f-document" checked> document</label>
  </fieldset>
  <fieldset title="Faits obsolètes (invalid_at renseigné)">
    <label><input type="checkbox" id="f-obsoletes" checked> obsolètes</label>
    <label><input type="checkbox" id="obsoletes-masques"> les masquer (plutôt que les estomper)</label>
  </fieldset>
  <fieldset title="Dimension de la scène">
    <label><input type="checkbox" id="mode-2d"> vue 2D</label>
  </fieldset>
  <span id="status">Chargement du graphe complet…</span>
</header>
<main>
  <div id="scene"></div>
  <aside>
    <h2>Entité sélectionnée</h2>
    <div id="entite-selection"><p class="vide">Cliquer un nœud pour l'explorer.</p></div>
    <h2 id="titre-faits">Faits</h2>
    <div id="faits"><p class="vide">Aucune entité sélectionnée.</p></div>
  </aside>
</main>
<script src="/viz/vendor/3d-force-graph.min.js"></script>
<script>
"use strict";

// Palette de communautés : couleurs stables par index (communauté = couleur, ADR 0010 pt.6).
const PALETTE = [
  "#6ea8fe", "#74c69d", "#f0a63a", "#e5534b", "#b98ee0",
  "#4cc9c0", "#f2c14e", "#f27db0", "#8ecae6", "#a3be8c",
];
const couleurCommunaute = (c) => PALETTE[c % PALETTE.length];

const state = { noeuds: new Map(), aretes: [], centre: null, selection: null };

function cle(a) { return [a.source, a.target, a.text].join("|"); }

function setStatus(msg) { document.getElementById("status").textContent = msg; }

function provenanceVisible(a) {
  return document.getElementById(`f-${a.provenance.source}`).checked;
}

function validiteVisible(a) {
  if (a.invalid_at === null) return true;
  return document.getElementById("f-obsoletes").checked;
}

// Fusionne les nœuds/arêtes reçus (graphe complet ou voisinage étendu) dans l'état
// courant, sans dupliquer — le clic sur un nœud « déplie » son voisinage in place.
function fusionner(noeuds, aretes) {
  for (const n of noeuds) {
    const existant = state.noeuds.get(n.nom);
    if (existant) {
      existant.communaute = n.communaute;
      existant.centralite = n.centralite;
    } else {
      state.noeuds.set(n.nom, { id: n.nom, nom: n.nom, communaute: n.communaute ?? 0, centralite: n.centralite ?? 0 });
    }
  }
  const connues = new Set(state.aretes.map(cle));
  for (const a of aretes) if (!connues.has(cle(a))) state.aretes.push(a);
}

async function chargerGrapheComplet() {
  setStatus("Chargement du graphe complet…");
  const params = new URLSearchParams({ limite: "500" });
  const provs = [];
  if (document.getElementById("f-conversation").checked) provs.push("conversation");
  if (document.getElementById("f-document").checked) provs.push("document");
  // L'API ne filtre que sur UNE provenance à la fois : si les deux (ou aucune) sont
  // cochées, on ne filtre pas côté serveur et on filtre côté rendu (voir `visible`).
  if (provs.length === 1) params.set("provenance", provs[0]);
  const res = await fetch(`/graph/complet?${params}`);
  if (!res.ok) { setStatus(`Erreur ${res.status}`); return; }
  const data = await res.json();
  state.noeuds.clear();
  state.aretes = [];
  state.centre = null;
  fusionner(data.noeuds, data.aretes);
  setStatus(`Graphe complet : ${state.noeuds.size} entités, ${state.aretes.length} faits${data.tronque ? " (tronqué aux plus connectées)" : ""}.`);
  rafraichir();
}

async function explorer(entite, { fusion = false } = {}) {
  const profondeur = document.getElementById("profondeur").value;
  setStatus(`Exploration de « ${entite} »…`);
  const res = await fetch(`/graph?entity=${encodeURIComponent(entite)}&depth=${profondeur}`);
  if (!res.ok) { setStatus(`Erreur ${res.status}`); return; }
  const data = await res.json();
  if (!fusion) { state.noeuds.clear(); state.aretes = []; }
  state.centre = data.center;
  fusionner(data.nodes.map((nom) => ({ nom, communaute: 0, centralite: 0 })), data.edges);
  setStatus(`${state.noeuds.size} entités, ${state.aretes.length} faits.`);
  rafraichir();
  selectionner(data.center);
}

function aretesVisibles() {
  return state.aretes.filter((a) => provenanceVisible(a) && validiteVisible(a));
}

function rafraichir() {
  const masquerObsoletes = document.getElementById("obsoletes-masques").checked;
  const aretes = aretesVisibles().filter((a) => !(masquerObsoletes && a.invalid_at !== null));
  const relies = new Set(aretes.flatMap((a) => [a.source, a.target]));
  const noeuds = [...state.noeuds.values()].filter(
    (n) => relies.has(n.nom) || n.nom === state.centre || state.noeuds.size <= 1
  );
  const donnees = {
    nodes: noeuds,
    links: aretes.map((a) => ({
      source: a.source, target: a.target, texte: a.text,
      provenance: a.provenance, obsolete: a.invalid_at !== null,
    })),
  };
  graphe.graphData(donnees);
}

function selectionner(nom) {
  state.selection = nom;
  const noeud = state.noeuds.get(nom);
  const zone = document.getElementById("entite-selection");
  if (!noeud) { zone.innerHTML = '<p class="vide">Entité inconnue.</p>'; return; }
  zone.innerHTML = `
    <span class="nom"></span>
    <span class="meta">Centralité : ${(noeud.centralite ?? 0).toFixed(2)} · communauté ${noeud.communaute ?? 0}</span>
    <button type="button" class="danger" id="btn-oublier">Oublier cette entité</button>
  `;
  zone.querySelector(".nom").textContent = noeud.nom;
  document.getElementById("btn-oublier").addEventListener("click", () => oublier(noeud.nom));
  afficherFaits(nom);
}

async function oublier(entite) {
  if (!confirm(`Oublier définitivement « ${entite} » ? Cette suppression est irréversible.`)) return;
  const res = await fetch(`/facts?entity=${encodeURIComponent(entite)}`, { method: "DELETE" });
  if (!res.ok) { setStatus(`Erreur ${res.status}`); return; }
  const { forgotten } = await res.json();
  setStatus(`« ${entite} » oubliée : ${forgotten} fait(s) supprimé(s).`);
  state.noeuds.delete(entite);
  state.aretes = state.aretes.filter((a) => a.source !== entite && a.target !== entite);
  document.getElementById("entite-selection").innerHTML = '<p class="vide">Cliquer un nœud pour l\'explorer.</p>';
  document.getElementById("faits").innerHTML = '<p class="vide">Aucune entité sélectionnée.</p>';
  rafraichir();
}

function afficherFaits(entite) {
  document.getElementById("titre-faits").textContent = `Faits — ${entite}`;
  const zone = document.getElementById("faits");
  const miens = aretesVisibles().filter((a) => a.source === entite || a.target === entite);
  if (!miens.length) { zone.innerHTML = '<p class="vide">Aucun fait visible avec les filtres actuels.</p>'; return; }
  zone.replaceChildren();
  for (const a of miens) {
    const div = document.createElement("div");
    div.className = "fait" + (a.invalid_at !== null ? " obsolete" : "");
    const dates = [
      a.valid_at ? `depuis le ${new Date(a.valid_at).toLocaleDateString("fr-FR")}` : null,
      a.invalid_at ? `obsolète depuis le ${new Date(a.invalid_at).toLocaleDateString("fr-FR")}` : null,
    ].filter(Boolean).join(" · ");
    div.innerHTML = `<div></div><div class="meta"><span class="badge ${a.provenance.source}"></span> <span></span></div>`;
    div.children[0].textContent = a.text;
    div.querySelector(".badge").textContent = a.provenance.source === "conversation" ? "conversation" : "document";
    div.querySelector(".meta span:last-child").textContent = [a.provenance.name, dates].filter(Boolean).join(" · ");
    zone.append(div);
  }
}

// --- Scène 3d-force-graph (vendorée, zéro CDN) ---
const graphe = ForceGraph3D()(document.getElementById("scene"))
  .backgroundColor("#0e1013")
  .nodeLabel((n) => n.nom)
  .nodeColor((n) => n.nom === state.centre ? "#f0a63a" : couleurCommunaute(n.communaute ?? 0))
  .nodeVal((n) => 2 + 8 * (n.centralite ?? 0))
  .linkColor((l) => l.obsolete ? "#6c757d" : (l.provenance.source === "document" ? "#74c69d" : "#6ea8fe"))
  .linkOpacity(0.55)
  .linkWidth((l) => l.obsolete ? 0.5 : 1)
  .linkLabel((l) => l.texte)
  .onNodeClick((n) => { explorer(n.nom, { fusion: true }); })
  .onNodeHover((n) => { document.getElementById("scene").style.cursor = n ? "pointer" : null; });

function redimensionner() {
  const el = document.getElementById("scene");
  graphe.width(el.clientWidth).height(el.clientHeight);
}
window.addEventListener("resize", redimensionner);
redimensionner();

document.getElementById("form-recherche").addEventListener("submit", (e) => {
  e.preventDefault();
  const entite = document.getElementById("entite").value.trim();
  if (entite) explorer(entite);
});
document.getElementById("btn-graphe-complet").addEventListener("click", chargerGrapheComplet);
for (const id of ["f-conversation", "f-document", "f-obsoletes", "obsoletes-masques"]) {
  document.getElementById(id).addEventListener("change", () => {
    rafraichir();
    if (state.selection) afficherFaits(state.selection);
  });
}
document.getElementById("mode-2d").addEventListener("change", (e) => {
  graphe.numDimensions(e.target.checked ? 2 : 3);
});

chargerGrapheComplet();
</script>
</body>
</html>
